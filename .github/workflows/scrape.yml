name: Daily Cruise Price Scrape

on:
  schedule:
    # 6 AM UTC daily
    - cron: '0 6 * * *'
  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

# Required for the git push step to commit data files back to the repo
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scrapers/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      # Install Chromium unconditionally — both scrapers use Playwright
      - name: Install Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Run scrapers
        id: scrape
        run: python scrapers/run_all.py
        # Don't fail the workflow immediately — let the commit step run
        # so any partial data is preserved
        continue-on-error: true

      - name: Copy data files for GitHub Pages
        run: |
          mkdir -p docs/data
          cp data/latest.json docs/data/latest.json
          cp data/manifest.json docs/data/manifest.json

      - name: Commit and push data files
        run: |
          git config user.name "cruise-price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/data/
          # Only commit if there are staged changes
          git diff --staged --quiet || git commit -m "data: scrape $(date -u +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fail the workflow if the scraper step failed (after data is committed)
      - name: Check scraper result
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "One or more scrapers failed. Check logs above for details."
          exit 1
